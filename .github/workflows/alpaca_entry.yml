name: Alpaca Entry (Monday Close)

on:
  schedule:
    # Monday 2:30 PM CT -- normal entry day
    # CDT (Mar-Nov): UTC-5 -> 19:30 UTC
    - cron: '30 19 * * 1'
    # CST (Nov-Mar): UTC-6 -> 20:30 UTC
    - cron: '30 20 * * 1'
    # Tuesday 2:30 PM CT -- fallback when Monday is a holiday
    # CDT (Mar-Nov): UTC-5 -> 19:30 UTC
    - cron: '30 19 * * 2'
    # CST (Nov-Mar): UTC-6 -> 20:30 UTC
    - cron: '30 20 * * 2'
  workflow_dispatch:

permissions:
  contents: write

# Prevent the rare case where a manual dispatch overlaps with the scheduled
# cron -- duplicate orders would be catastrophic.
concurrency:
  group: alpaca-entry
  cancel-in-progress: false

jobs:
  alpaca-entry:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NTFY_CHANNEL: ${{ secrets.NTFY_CHANNEL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run entry orders
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER || 'true' }}
        run: python automation/alpaca_trader.py entry

      - name: Commit state
        run: |
          git config user.name  "momentum-bot"
          git config user.email "momentum-bot@users.noreply.github.com"
          git add data/alpaca_state.json || true
          git add data/system_log.jsonl || true
          git diff --cached --quiet || git commit -m "alpaca: $(date +%Y-%m-%d) entry orders placed"
          # Retry push with rebase -- handles concurrent commits from other workflows.
          # JSONL log files (system_log, health_check_log, etc.) get appended to by
          # multiple workflows; if two workflows commit within seconds of each other,
          # rebase cannot auto-merge and the whole push fails. Retry loop attempts 5
          # times with jittered backoff; if rebase conflicts on log files, accepts
          # "theirs" (additive JSONL is safe to merge by taking both sides).
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Push succeeded on attempt $attempt"
              break
            else
              echo "Push attempt $attempt failed; aborting rebase and retrying"
              git rebase --abort 2>/dev/null || true
              # On conflict, prefer remote JSONL additions (theirs) to avoid losing
              # other workflows log entries. -X theirs applies to content conflicts.
              git pull origin main --no-rebase --strategy=recursive -X theirs --no-edit 2>/dev/null || true
              if [ $attempt -eq 5 ]; then
                echo "All 5 push attempts exhausted; giving up (data stays in runner fs)"
                exit 1
              fi
              sleep $((RANDOM % 5 + 2))
            fi
          done
