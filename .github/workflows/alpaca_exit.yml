name: Alpaca Exit (Friday Close)

on:
  schedule:
    # Friday 2:30 PM CT -- normal exit day
    # CDT (Mar-Nov): UTC-5 -> 19:30 UTC
    - cron: '30 19 * * 5'
    # CST (Nov-Mar): UTC-6 -> 20:30 UTC
    - cron: '30 20 * * 5'
    # Thursday 2:30 PM CT -- fallback when Friday is a holiday
    # CDT (Mar-Nov): UTC-5 -> 19:30 UTC
    - cron: '30 19 * * 4'
    # CST (Nov-Mar): UTC-6 -> 20:30 UTC
    - cron: '30 20 * * 4'
  workflow_dispatch:

permissions:
  contents: write

# Serialize manual dispatch with scheduled cron -- double-exit would mean
# attempting to sell positions we've already sold.
concurrency:
  group: alpaca-exit
  cancel-in-progress: false

jobs:
  alpaca-exit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NTFY_CHANNEL: ${{ secrets.NTFY_CHANNEL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install Alpaca SDK
        run: pip install "alpaca-trade-api>=3.0.0" "aiohttp>=3.9.0"

      - name: Run exit orders
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER || 'true' }}
          ALPACA_WITHDRAWAL_MODE: ${{ secrets.ALPACA_WITHDRAWAL_MODE || 'off' }}
          ALPACA_WITHDRAWAL_PCT: ${{ secrets.ALPACA_WITHDRAWAL_PCT || '0.25' }}
          ALPACA_LUMP_SUM_AMOUNT: ${{ secrets.ALPACA_LUMP_SUM_AMOUNT || '0' }}
        run: python automation/alpaca_trader.py exit

      - name: Commit state
        run: |
          git config user.name  "momentum-bot"
          git config user.email "momentum-bot@users.noreply.github.com"
          git add data/alpaca_state.json || true
          git add data/system_log.jsonl || true
          git diff --cached --quiet || git commit -m "alpaca: $(date +%Y-%m-%d) exit orders placed"
          git pull --rebase origin main
          git push
