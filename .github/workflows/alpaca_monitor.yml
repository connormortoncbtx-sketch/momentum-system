name: Alpaca Intraday Monitor

on:
  schedule:
    # Job 1 -- 8:30 AM CT (market open) Mon-Fri
    # CDT (Mar-Nov): UTC-5 -> 13:30 UTC
    - cron: '30 13 * * 1-5'
    # CST (Nov-Mar): UTC-6 -> 14:30 UTC
    - cron: '30 14 * * 1-5'

    # Job 2 -- 11:15 AM CT Mon-Fri
    # CDT (Mar-Nov): UTC-5 -> 16:15 UTC
    - cron: '15 16 * * 1-5'
    # CST (Nov-Mar): UTC-6 -> 17:15 UTC
    - cron: '15 17 * * 1-5'

    # Job 3 -- 2:00 PM CT Mon-Fri (short run to close)
    # CDT (Mar-Nov): UTC-5 -> 19:00 UTC
    - cron: '0 19 * * 1-5'
    # CST (Nov-Mar): UTC-6 -> 20:00 UTC
    - cron: '0 20 * * 1-5'

  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration in minutes'
        required: false
        default: '180'

permissions:
  contents: write

# CONCURRENCY DESIGN (revised 2026-04-27):
#
# Previous design parameterised the group by github.event.schedule, intending
# to let the three time-of-day jobs (8:30/11:15/14:00 CT) coexist while
# preventing same-job double-fire on DST boundaries. That design was broken:
# the dual-cron pattern fires both CDT and CST variants every weekday (not
# just on DST boundary days), and each cron string is a unique group key,
# so the CDT and CST variants of the SAME logical job ran simultaneously.
# Result: up to 6 simultaneous monitor runs per day, racing on the alpaca
# state file and creating order placement hazards.
#
# Revised design: ONE workflow-wide concurrency group, cancel-in-progress.
# This collapses behavior to "exactly one monitor running at any moment":
#   - At 8:30 CT, the CDT cron fires (CST equivalent fires at 9:30 CT, gets
#     cancelled by next scheduled run anyway -- see below).
#   - At 11:15 CT, the existing 8:30 monitor (still polling under its 180min
#     duration) is cancelled, and a fresh monitor starts that recalculates
#     remaining-to-close as ~3hr 45min.
#   - At 14:00 CT, the 11:15 monitor is cancelled and a new short run starts
#     for the final hour.
#   - In CST, the 9:30/12:15/15:00 UTC-derived crons replace those, but the
#     same cancel-in-progress flow applies.
#
# Cancellation is safe here: the monitor's main loop holds no in-flight
# orders -- each iteration is a self-contained get-positions/check/save
# sequence. Worst case is a partially-saved alpaca_state.json, which the
# next monitor reads on startup. Phase 2 upgrades atomically save state
# immediately after placing the trail (see upgrade_to_phase2 docstring),
# so even mid-upgrade cancellation can't strand a position.
concurrency:
  group: alpaca-monitor
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 200
    env:
      NTFY_CHANNEL: ${{ secrets.NTFY_CHANNEL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine duration
        id: duration
        run: |
          INPUT_DURATION="${{ github.event.inputs.duration }}"
          if [ -n "$INPUT_DURATION" ] && [ "$INPUT_DURATION" != "" ]; then
            echo "duration=$INPUT_DURATION" >> $GITHUB_OUTPUT
            echo "Using manual input: $INPUT_DURATION minutes"
          else
            HOUR=$(TZ='America/Chicago' date +%-H)
            MINUTE=$(TZ='America/Chicago' date +%-M)
            TOTAL_MINS=$(( HOUR * 60 + MINUTE ))
            CLOSE_MINS=$(( 15 * 60 ))
            REMAINING=$(( CLOSE_MINS - TOTAL_MINS + 10 ))
            if [ $REMAINING -gt 185 ]; then REMAINING=185; fi
            if [ $REMAINING -lt 10 ]; then REMAINING=10; fi
            echo "duration=$REMAINING" >> $GITHUB_OUTPUT
            echo "CT time: ${HOUR}:$(printf '%02d' $MINUTE) -- Running monitor for $REMAINING minutes"
          fi

      - name: Run intraday monitor
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER || 'true' }}
        run: |
          python automation/alpaca_monitor.py --duration ${{ steps.duration.outputs.duration }}

      - name: Commit state updates
        run: |
          git config user.name  "momentum-bot"
          git config user.email "momentum-bot@users.noreply.github.com"
          git add data/alpaca_state.json || true
          git add data/system_log.jsonl || true
          git diff --cached --quiet || git commit -m "alpaca: monitor state update $(date +%Y-%m-%d-%H%M)"
          # Retry push with rebase -- handles concurrent commits from other workflows.
          # JSONL log files (system_log, health_check_log, etc.) get appended to by
          # multiple workflows; if two workflows commit within seconds of each other,
          # rebase cannot auto-merge and the whole push fails. Retry loop attempts 5
          # times with jittered backoff; if rebase conflicts on log files, accepts
          # "theirs" (additive JSONL is safe to merge by taking both sides).
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Push succeeded on attempt $attempt"
              break
            else
              echo "Push attempt $attempt failed; aborting rebase and retrying"
              git rebase --abort 2>/dev/null || true
              git pull origin main --no-rebase --strategy=recursive -X theirs --no-edit 2>/dev/null || true
              if [ $attempt -eq 5 ]; then
                echo "All 5 push attempts exhausted; giving up"
                # This workflow historically used || true so failures were non-fatal.
                # Preserve that: exit 0, not 1. Data stays in runner fs.
                exit 0
              fi
              sleep $((RANDOM % 5 + 2))
            fi
          done
