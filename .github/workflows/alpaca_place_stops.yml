name: Alpaca Place Stops (Monday Post-Close)

# Runs ~5 minutes after Monday market close to place hard stops on positions
# that just filled. Previously this was handled only by the Tuesday morning
# monitor poll, creating a ~17 hour window between fill and stop coverage.
#
# Timing:
#   Monday market close = 3:00 PM CT
#   MOC fills settle by ~3:02 PM CT
#   This workflow fires at 3:10 PM CT -- gives fills time to record in
#   Alpaca's system and avoids racing with the alpaca_entry workflow's
#   state commit.

on:
  schedule:
    # Monday 3:10 PM CT
    # CDT (Mar-Nov): UTC-5 -> 20:10 UTC
    - cron: '10 20 * * 1'
    # CST (Nov-Mar): UTC-6 -> 21:10 UTC
    - cron: '10 21 * * 1'
    # Tuesday 3:10 PM CT -- fallback when Monday is a holiday
    # (matches alpaca_entry's Tuesday fallback cron)
    # CDT (Mar-Nov): UTC-5 -> 20:10 UTC
    - cron: '10 20 * * 2'
    # CST (Nov-Mar): UTC-6 -> 21:10 UTC
    - cron: '10 21 * * 2'
  workflow_dispatch:

permissions:
  contents: write

# Prevent overlap with manual dispatches or the entry workflow's late state commits.
# Stop placement is idempotent (adopts existing stops) so collision with another
# instance is safe, but sequential runs avoid race conditions on state file writes.
concurrency:
  group: alpaca-place-stops
  cancel-in-progress: false

jobs:
  alpaca-place-stops:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NTFY_CHANNEL: ${{ secrets.NTFY_CHANNEL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install Alpaca SDK
        run: pip install "alpaca-trade-api>=3.0.0" "aiohttp>=3.9.0"

      - name: Place Phase 1 stops on Monday positions
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER || 'true' }}
        run: python automation/alpaca_trader.py place_stops

      - name: Commit state
        run: |
          git config user.name  "momentum-bot"
          git config user.email "momentum-bot@users.noreply.github.com"
          git add data/alpaca_state.json || true
          git add data/system_log.jsonl || true
          git diff --cached --quiet || git commit -m "alpaca: $(date +%Y-%m-%d) Phase 1 stops placed"
          # Retry push with rebase -- handles concurrent commits from other workflows.
          # See alpaca_entry.yml for rationale on the retry pattern.
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Push succeeded on attempt $attempt"
              break
            else
              echo "Push attempt $attempt failed; aborting rebase and retrying"
              git rebase --abort 2>/dev/null || true
              git pull origin main --no-rebase --strategy=recursive -X theirs --no-edit 2>/dev/null || true
              if [ $attempt -eq 5 ]; then
                echo "All 5 push attempts exhausted; giving up (data stays in runner fs)"
                exit 1
              fi
              sleep $((RANDOM % 5 + 2))
            fi
          done
