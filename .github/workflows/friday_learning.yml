name: Friday Learning Loop
on:
  schedule:
    # Friday 6:00 PM CT -- collect returns, self-refine, retrain
    # Runs BEFORE the pipeline so fresh model/weights are ready
    # CDT (Mar-Nov): UTC-5 -> 23:00 UTC Friday
    - cron: '0 23 * * 5'
    # CST (Nov-Mar): UTC-6 -> 00:00 UTC Saturday
    - cron: '0 0 * * 6'
  workflow_dispatch:
permissions:
  contents: write
# Prevent overlap between scheduled run and manual dispatch (common cause of
# commit collisions on the performance_log).
concurrency:
  group: friday-learning
  cancel-in-progress: false
jobs:
  learn-and-refine:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Notifier channel for push alerts -- available to every step.
      NTFY_CHANNEL: ${{ secrets.NTFY_CHANNEL }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      # execution_tracker.py imports alpaca_trade_api to query realized fills.
      # Not in requirements.txt (intentional -- most workflows don't need it),
      # so install it explicitly here. Without this, execution_tracker warns
      # "No module named 'alpaca_trade_api'" and records zero fills even when
      # real fills exist in Alpaca.
      # websockets>=12.0 also pinned here as belt-and-suspenders against the
      # yfinance/websockets.sync silent-failure incident -- if the
      # requirements.txt pin is ever lost in a merge, this line keeps the
      # learning loop alive.
      - name: Install Alpaca SDK
        run: pip install "alpaca-trade-api>=3.0.0" "aiohttp>=3.9.0" "websockets>=12.0"
      # Capture run-start epoch so post-run verification can check whether
      # collect_returns.py actually wrote to performance_log.csv. Without
      # this, continue-on-error swallows import failures and we'd never
      # know the learning loop silently no-op'd.
      - name: Record run start time
        id: run_start
        run: echo "epoch=$(date +%s)" >> $GITHUB_OUTPUT
      # Each learning step uses continue-on-error so one failure doesn't kill
      # the remaining steps. The verify step at the end fails the workflow
      # loud if collect_returns.py didn't update performance_log.csv, so
      # silent failures (like the websockets.sync ModuleNotFoundError that
      # masked weeks of missing data) can't recur unnoticed.
      - name: Collect actual returns
        continue-on-error: true
        run: python automation/collect_returns.py
      - name: Track execution metrics
        continue-on-error: true
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER || 'true' }}
        run: python automation/execution_tracker.py
      - name: Analyze weekly winners
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python automation/analyze_winners.py
      - name: Run self-refinement
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python automation/self_refine.py
      - name: Retrain model if enough data
        continue-on-error: true
        run: python automation/retrain.py
      - name: Verify collect_returns actually ran
        # collect_returns.py writes to performance_log.csv. If its mtime
        # hasn't advanced past the run-start epoch, the step silently
        # failed (most likely an import error that continue-on-error
        # swallowed). Fail the workflow loud so we get a notification.
        # This step does NOT use continue-on-error -- it is the canary.
        if: always()
        run: |
          PERF_LOG="data/performance_log.csv"
          RUN_START="${{ steps.run_start.outputs.epoch }}"
          if [ ! -f "$PERF_LOG" ]; then
            echo "::error::performance_log.csv missing -- collect_returns.py never wrote output"
            exit 1
          fi
          FILE_MTIME=$(stat -c %Y "$PERF_LOG")
          if [ "$FILE_MTIME" -lt "$RUN_START" ]; then
            echo "::error::performance_log.csv was not updated this run."
            echo "::error::collect_returns.py likely failed silently (continue-on-error masking an exception)."
            echo "File mtime: $(date -d @$FILE_MTIME -u)"
            echo "Run start:  $(date -d @$RUN_START -u)"
            exit 1
          fi
          echo "performance_log.csv updated this run -- collect_returns.py succeeded"
      - name: Commit results
        if: always()
        run: |
          git config user.name  "momentum-bot"
          git config user.email "momentum-bot@users.noreply.github.com"
          DATE=$(date +%Y-%m-%d)
          git add data/performance_log.csv
          git add data/execution_log.csv || true
          git add data/basket_metrics_log.csv || true
          git add config/weights.json
          git add models/lgbm_model.pkl || true
          git add refinements/ || true
          git add insights/ || true
          git add data/.collect_lock || true
          git add data/system_log.jsonl || true
          # Use || true fallbacks on the refinement-note cat so a missing
          # note file can't break the commit.
          git diff --cached --quiet || git commit -m "learning: ${DATE} returns collected + weights refined
          $(cat refinements/${DATE}.md 2>/dev/null | head -3 || echo 'No refinement note')"
          # Retry push with rebase -- handles concurrent commits from other workflows.
          # JSONL log files (system_log, health_check_log, etc.) get appended to by
          # multiple workflows; if two workflows commit within seconds of each other,
          # rebase cannot auto-merge and the whole push fails. Retry loop attempts 5
          # times with jittered backoff; if rebase conflicts on log files, accepts
          # "theirs" (additive JSONL is safe to merge by taking both sides).
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Push succeeded on attempt $attempt"
              break
            else
              echo "Push attempt $attempt failed; aborting rebase and retrying"
              git rebase --abort 2>/dev/null || true
              # On conflict, prefer remote JSONL additions (theirs) to avoid losing
              # other workflows log entries. -X theirs applies to content conflicts.
              git pull origin main --no-rebase --strategy=recursive -X theirs --no-edit 2>/dev/null || true
              if [ $attempt -eq 5 ]; then
                echo "All 5 push attempts exhausted; giving up (data stays in runner fs)"
                exit 1
              fi
              sleep $((RANDOM % 5 + 2))
            fi
          done
