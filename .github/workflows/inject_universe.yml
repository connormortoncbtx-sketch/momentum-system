name: Inject Universe
 
on:
  workflow_dispatch:
    inputs:
      ticker_file:
        description: 'Path to ticker file in repo (e.g. nasdaqlisted.csv)'
        required: true
        default: 'nasdaqlisted.csv'
 
permissions:
  contents: write
 
jobs:
  inject:
    runs-on: ubuntu-latest
    timeout-minutes: 30
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Run injection
        run: |
          python automation/inject_universe.py \
            --file "${{ github.event.inputs.ticker_file }}"
 
      - name: Commit updated universe
        run: |
          git config user.name  "momentum-bot"
          git config user.email "momentum-bot@users.noreply.github.com"
          git add data/universe.csv
          git diff --cached --quiet || git commit -m "universe: injected ${{ github.event.inputs.ticker_file }}"
          git pull --rebase origin main
          git push
