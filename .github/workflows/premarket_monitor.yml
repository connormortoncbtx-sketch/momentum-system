name: Pre-Market Monitor

on:
  schedule:
    # Monday 6:00 AM CT
    # CDT (Mar-Nov): UTC-5 → 11:00 UTC
    - cron: '0 11 * * 1'
    # CST (Nov-Mar): UTC-6 → 12:00 UTC
    - cron: '0 12 * * 1'
    # Tuesday 6:00 AM CT
    # CDT (Mar-Nov): UTC-5 → 11:00 UTC
    - cron: '0 11 * * 2'
    # CST (Nov-Mar): UTC-6 → 12:00 UTC
    - cron: '0 12 * * 2'
  workflow_dispatch:

permissions:
  contents: write

# The DST dual-cron setup means CDT and CST triggers can both fire on a DST
# boundary day. Serialize to prevent double-monitoring; the in-script DST
# guard exits whichever ran at the wrong hour.
concurrency:
  group: premarket-monitor-${{ github.event.schedule || github.run_id }}
  cancel-in-progress: false

jobs:
  premarket-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 150   # 2.5 hours covers 7:00-9:30 AM window
    env:
      NTFY_CHANNEL: ${{ secrets.NTFY_CHANNEL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pre-market monitor loop
        run: python automation/premarket_monitor.py

      - name: Update index
        run: python automation/update_index.py

      - name: Commit updated report
        run: |
          git config user.name  "momentum-bot"
          git config user.email "momentum-bot@users.noreply.github.com"
          DATE=$(date +%Y-%m-%d)
          DAY=$(date +%A | tr '[:upper:]' '[:lower:]')
          git add docs/
          git add data/premarket_log.json
          git add data/system_log.jsonl || true
          git diff --cached --quiet || git commit -m "premarket: ${DATE} ${DAY} final check complete"
          # Retry push with rebase -- handles concurrent commits from other workflows.
          # JSONL log files (system_log, health_check_log, etc.) get appended to by
          # multiple workflows; if two workflows commit within seconds of each other,
          # rebase cannot auto-merge and the whole push fails. Retry loop attempts 5
          # times with jittered backoff; if rebase conflicts on log files, accepts
          # "theirs" (additive JSONL is safe to merge by taking both sides).
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Push succeeded on attempt $attempt"
              break
            else
              echo "Push attempt $attempt failed; aborting rebase and retrying"
              git rebase --abort 2>/dev/null || true
              # On conflict, prefer remote JSONL additions (theirs) to avoid losing
              # other workflows log entries. -X theirs applies to content conflicts.
              git pull origin main --no-rebase --strategy=recursive -X theirs --no-edit 2>/dev/null || true
              if [ $attempt -eq 5 ]; then
                echo "All 5 push attempts exhausted; giving up (data stays in runner fs)"
                exit 1
              fi
              sleep $((RANDOM % 5 + 2))
            fi
          done