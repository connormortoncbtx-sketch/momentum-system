name: Weekend Catalyst Refresh

on:
  schedule:
    # Sunday 7:00 PM CT
    # CDT (Mar-Nov): UTC-5 → 00:00 UTC Monday
    - cron: '0 0 * * 1'
    # CST (Nov-Mar): UTC-6 → 01:00 UTC Monday
    - cron: '0 1 * * 1'
    # Monday 5:00 AM CT
    # CDT (Mar-Nov): UTC-5 → 10:00 UTC
    - cron: '0 10 * * 1'
    # CST (Nov-Mar): UTC-6 → 11:00 UTC
    - cron: '0 11 * * 1'
  workflow_dispatch:
    inputs:
      run_label:
        description: 'Label for this refresh run'
        required: false
        default: 'manual_refresh'

permissions:
  contents: write

# Serialize the two daily refreshes so CDT and CST crons that both fire on a
# DST-boundary day can't both be running at the same time (the idempotency lock
# inside the script catches most cases, but serializing here is cheaper).
concurrency:
  group: weekend-refresh
  cancel-in-progress: false

jobs:
  catalyst-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # 2 hours — tiered scoring keeps catalyst manageable
    env:
      NTFY_CHANNEL: ${{ secrets.NTFY_CHANNEL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine run label
        id: label
        run: |
          HOUR=$(date -u +%H)
          DAY=$(date -u +%u)
          # Sunday night runs fire at 00:00 or 01:00 UTC (Monday)
          if [ "$HOUR" = "00" ] || [ "$HOUR" = "01" ]; then
            echo "label=sunday_night" >> $GITHUB_OUTPUT
          # Monday morning runs fire at 10:00 or 11:00 UTC
          elif [ "$HOUR" = "10" ] || [ "$HOUR" = "11" ]; then
            echo "label=monday_morning" >> $GITHUB_OUTPUT
          else
            echo "label=${{ github.event.inputs.run_label || 'manual_refresh' }}" >> $GITHUB_OUTPUT
          fi

      - name: Run catalyst refresh
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python automation/weekend_refresh.py ${{ steps.label.outputs.label }}

      - name: Commit updated report
        run: |
          git config user.name  "momentum-bot"
          git config user.email "momentum-bot@users.noreply.github.com"

          DATE=$(date +%Y-%m-%d)
          LABEL="${{ steps.label.outputs.label }}"

          git add docs/
          git add data/signals.csv
          git add data/scores_final.csv
          git add data/refresh_log.json || true
          git add data/.refresh_lock || true
          git add data/system_log.jsonl || true

          # Fallback pattern: if scores_final.csv is malformed, the top-pick
          # interpolation shouldn't block the commit step.
          TOP_PICK=$(python -c "import pandas as pd; df=pd.read_csv('data/scores_final.csv'); r=df.iloc[0]; print(r['symbol'], f'score={r[\"alpha_score\"]:.4f}')" 2>/dev/null || echo "unknown")
          REGIME=$(python -c "import json; d=json.load(open('data/regime.json')); print(d['regime'])" 2>/dev/null || echo "unknown")

          git diff --cached --quiet || git commit -m "refresh: ${DATE} ${LABEL}

          Top pick: ${TOP_PICK}
          Regime: ${REGIME}"

          git pull --rebase origin main
          git push
