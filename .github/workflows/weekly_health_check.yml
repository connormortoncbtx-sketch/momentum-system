name: Weekly Health Check

on:
  schedule:
    # Friday 4:30 PM CT -- after Alpaca exit, before learning loop
    # CDT (Mar-Nov): UTC-5 -> 21:30 UTC
    - cron: '30 21 * * 5'
    # CST (Nov-Mar): UTC-6 -> 22:30 UTC
    - cron: '30 22 * * 5'
  workflow_dispatch:

permissions:
  contents: write

# Serialize scheduled run with any manual dispatch -- read_logs/notify calls
# should not race with each other on the same jsonl file.
concurrency:
  group: weekly-health-check
  cancel-in-progress: false

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run health check
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NTFY_CHANNEL: ${{ secrets.NTFY_CHANNEL }}
        run: python automation/health_check.py

      - name: Commit health log
        run: |
          git config user.name  "momentum-bot"
          git config user.email "momentum-bot@users.noreply.github.com"
          git add data/system_log.jsonl || true
          git add data/health_check_log.jsonl || true
          git diff --cached --quiet || git commit -m "health: $(date +%Y-%m-%d) weekly check complete"
          # Retry push with rebase -- handles concurrent commits from other workflows.
          # JSONL log files (system_log, health_check_log, etc.) get appended to by
          # multiple workflows; if two workflows commit within seconds of each other,
          # rebase cannot auto-merge and the whole push fails. Retry loop attempts 5
          # times with jittered backoff; if rebase conflicts on log files, accepts
          # "theirs" (additive JSONL is safe to merge by taking both sides).
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Push succeeded on attempt $attempt"
              break
            else
              echo "Push attempt $attempt failed; aborting rebase and retrying"
              git rebase --abort 2>/dev/null || true
              git pull origin main --no-rebase --strategy=recursive -X theirs --no-edit 2>/dev/null || true
              if [ $attempt -eq 5 ]; then
                echo "All 5 push attempts exhausted; giving up"
                # This workflow historically used || true so failures were non-fatal.
                # Preserve that: exit 0, not 1. Data stays in runner fs.
                exit 0
              fi
              sleep $((RANDOM % 5 + 2))
            fi
          done