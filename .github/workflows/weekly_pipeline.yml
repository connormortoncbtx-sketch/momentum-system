name: Weekly Pipeline
on:
  schedule:
    # Friday 8:00 PM CT — fires AFTER friday_learning completes
    # CDT (Mar-Nov): UTC-5 -> 01:00 UTC Saturday
    - cron: '0 1 * * 6'
    # CST (Nov-Mar): UTC-6 -> 02:00 UTC Saturday
    - cron: '0 2 * * 6'
  workflow_dispatch:   # allow manual trigger from GitHub UI
    inputs:
      force:
        description: 'Force run even if scores_final.csv was updated recently (overrides ghost-run prevention)'
        required: false
        default: 'false'
        type: boolean
permissions:
  contents: write
# Serialize scheduled cron and any manual dispatch -- pipeline writes to
# scores_final.csv and two concurrent runs would corrupt state.
concurrency:
  group: weekly-pipeline
  cancel-in-progress: false
jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 hours max -- expanded universe needs more time
    env:
      NTFY_CHANNEL: ${{ secrets.NTFY_CHANNEL }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git log works
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Restore scores_final.csv mtime from git history
        # Default git checkout sets all file mtimes to "now". The ghost-run
        # prevention in run_pipeline.py uses scores_final.csv mtime to decide
        # whether this is a redundant re-execution. Without this step, every
        # fresh checkout shows mtime="just now" and ghost prevention would
        # skip every scheduled run. Restore mtime to the commit time of the
        # most recent change to the file.
        run: |
          FILE="data/scores_final.csv"
          if [ -f "$FILE" ]; then
            LAST_COMMIT_TIME=$(git log -1 --format=%at -- "$FILE")
            if [ -n "$LAST_COMMIT_TIME" ]; then
              touch -d "@$LAST_COMMIT_TIME" "$FILE"
              echo "Restored $FILE mtime to $(date -d "@$LAST_COMMIT_TIME" -u +'%Y-%m-%d %H:%M:%S UTC')"
            fi
          fi
      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "Force flag set -- bypassing ghost-run prevention"
            python run_pipeline.py --force
          else
            python run_pipeline.py
          fi
      - name: Update index
        run: python automation/update_index.py
      - name: Commit results
        run: |
          git config user.name  "momentum-bot"
          git config user.email "momentum-bot@users.noreply.github.com"
          DATE=$(date +%Y-%m-%d)
          git add docs/
          git add data/universe.csv
          git add data/regime.json
          git add data/scores_final.csv
          git add data/signals.csv
          git add data/system_log.jsonl || true
          git add models/lgbm_model.pkl || true
          # Commit-message interpolations now have `|| echo "unknown"` fallbacks
          # so that a corrupted regime.json or scores_final.csv doesn't crash
          # the commit step (which would block all later state from being saved).
          REGIME=$(python -c "import json; d=json.load(open('data/regime.json')); print(d['regime'])" 2>/dev/null || echo "unknown")
          UNIVERSE_COUNT=$(python -c "import pandas as pd; print(len(pd.read_csv('data/universe.csv')), 'tickers')" 2>/dev/null || echo "unknown")
          TOP_PICK=$(python -c "import pandas as pd; df=pd.read_csv('data/scores_final.csv'); r=df.iloc[0]; print(r['symbol'], f'score={r[\"alpha_score\"]:.4f}')" 2>/dev/null || echo "unknown")
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "pipeline: ${DATE} run complete
          Regime: ${REGIME}
          Universe: ${UNIVERSE_COUNT}
          Top pick: ${TOP_PICK}"
          # Retry push with rebase -- handles concurrent commits from other workflows.
          # JSONL log files (system_log, health_check_log, etc.) get appended to by
          # multiple workflows; if two workflows commit within seconds of each other,
          # rebase cannot auto-merge and the whole push fails. Retry loop attempts 5
          # times with jittered backoff; if rebase conflicts on log files, accepts
          # "theirs" (additive JSONL is safe to merge by taking both sides).
          for attempt in 1 2 3 4 5; do
            if git pull --rebase origin main && git push; then
              echo "Push succeeded on attempt $attempt"
              break
            else
              echo "Push attempt $attempt failed; aborting rebase and retrying"
              git rebase --abort 2>/dev/null || true
              # On conflict, prefer remote JSONL additions (theirs) to avoid losing
              # other workflows log entries. -X theirs applies to content conflicts.
              git pull origin main --no-rebase --strategy=recursive -X theirs --no-edit 2>/dev/null || true
              if [ $attempt -eq 5 ]; then
                echo "All 5 push attempts exhausted; giving up (data stays in runner fs)"
                exit 1
              fi
              sleep $((RANDOM % 5 + 2))
            fi
          done
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_id }}
          path: docs/reports/*.html
          retention-days: 90
