name: Weekly Pipeline
 
on:
  schedule:
    # Every Friday at 6:00 PM Eastern (23:00 UTC, accounts for EDT)
    - cron: '0 23 * * 5'
  workflow_dispatch:   # allow manual trigger from GitHub UI
 
permissions:
  contents: write
 
jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180   # 3 hours max — full universe takes time
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so git log works
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
 
      - name: Install dependencies
        run: pip install -r requirements.txt
 
      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python run_pipeline.py
 
      - name: Commit results
        run: |
          git config user.name  "momentum-bot"
          git config user.email "momentum-bot@users.noreply.github.com"
 
          DATE=$(date +%Y-%m-%d)
 
          git add reports/${DATE}.html
          git add data/universe.csv
          git add data/regime.json
          git add data/scores_final.csv
          git add data/signals.csv
          git add models/lgbm_model.pkl || true   # may not exist first run
 
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "pipeline: ${DATE} run complete
 
          Regime: $(python -c "import json; d=json.load(open('data/regime.json')); print(d['regime'])")
          Universe: $(python -c "import pandas as pd; print(len(pd.read_csv('data/universe.csv')), 'tickers')")
          Top pick: $(python -c "import pandas as pd; df=pd.read_csv('data/scores_final.csv'); r=df.iloc[0]; print(r['symbol'], f'score={r[\"alpha_score\"]:.4f}')")"
 
          git push
 
      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_id }}
          path: reports/*.html
          retention-days: 90
 
